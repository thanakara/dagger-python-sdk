{% extends "base.html" %}

{% block title %}
{{ title or "Oopsies..."}}
{% endblock %}

{% block body %}
<main>
    <h2>Error</h2>
    <hr>

    <h3>{{ status_code }}</h3>
    <p>{{ message }}</p>

    {% if detail %}
    <p style="color: var(--muted); font-size: 0.9rem; margin-top: -1.8rem;">
        {{ detail }}
    </p>
    {% endif %}

    <p style="margin-top: -1.5rem;">
        <a href="/"
            style="color: var(--accent); text-decoration: none; font-family: 'Playfair Display', serif; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--accent); padding-bottom: 1px;">
            Return home
        </a>
    </p>
</main>
{% endblock %}
