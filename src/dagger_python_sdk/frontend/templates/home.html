{% extends "base.html" %}

{% block stylesheets %}
{{ super() }}
{% endblock %}

{% block body %}

<hr>
<p>This is a humble introduction into dagger.io using

</p>

<ul>
    <li>
        <a href="{{ url_for('posts') }}">/posts</a>
    </li>
    <li>
        <a href="{{ url_for('get_posts') }}">/api/posts</a>
    </li>
</ul>
{% endblock %}
