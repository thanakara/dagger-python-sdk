{% extends "base.html" %}

{% block title %}
{{ super() }}
{% endblock %}

{% block stylesheets %}
{{ super() }}
{% endblock %}

{% block body %}
<h1>POSTS</h1>
<hr>
{% for post in posts %}
<a href="{{ url_for('all_user_posts', user_id=post.user_id) }}">{{ post.author.username }}</a>
<h2>
    <a href="{{ url_for('select_post', post_id=post.id) }}">{{ post.title }}</a>
</h2>
<p>{{ post.content }}</p>
{% endfor %}
{% endblock %}
